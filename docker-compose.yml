services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bescancv-api:latest
    container_name: bescancv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      UseInMemoryDb: "false"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=cv_project;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      Database__UseEnsureCreated: "true"
      CvStorage__LocalPdfFolder: /app/data/pdfs
      PublicBaseUrl: http://localhost:5226
      Jwt__Secret: docker-dev-secret-key-at-least-32-characters-long
      Jwt__Issuer: BEScanCV
      Jwt__Audience: BEScanCV-Clients
      Jwt__AccessTokenExpiryMinutes: 15
      Jwt__RefreshTokenExpiryDays: 7
    ports:
      - "5226:8080"
    volumes:
      - bescancv_pdf_data:/app/data/pdfs

  postgres:
    image: postgres:16-alpine
    container_name: bescancv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cv_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bescancv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cv_project"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bescancv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - bescancv_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bescancv_postgres_data:
  bescancv_redis_data:
  bescancv_pdf_data:
