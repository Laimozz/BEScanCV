services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bescancv-api:latest
    container_name: bescancv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      UseInMemoryDb: "false"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-cv_project};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      Database__UseEnsureCreated: "false"
      CvStorage__LocalPdfFolder: /app/data/pdfs
      PublicBaseUrl: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL, for example https://api.example.com}
      AllowedHosts: ${ALLOWED_HOSTS:-*}
      AiService__BaseUrl: ${AI_SERVICE_BASE_URL:?Set AI_SERVICE_BASE_URL}
      AiService__ParseSearchQueryPath: ${AI_PARSE_SEARCH_QUERY_PATH:-/api/v1/extract-query}
      AiService__ProcessCvPath: ${AI_PROCESS_CV_PATH:-/api/v1/cv/index}
      AiService__SemanticSearchPath: ${AI_SEMANTIC_SEARCH_PATH:-/api/v1/cv/match}
      AiService__ApiKey: ${AI_SERVICE_API_KEY:-}
      EmailSettings__SmtpServer: ${SMTP_SERVER:-smtp.gmail.com}
      EmailSettings__Port: ${SMTP_PORT:-587}
      EmailSettings__Username: ${SMTP_USERNAME:-}
      EmailSettings__Password: ${SMTP_PASSWORD:-}
      EmailSettings__SenderEmail: ${SMTP_SENDER_EMAIL:-}
      EmailSettings__SenderName: ${SMTP_SENDER_NAME:-RecruitAI}
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET with at least 32 characters}
      Jwt__Issuer: ${JWT_ISSUER:-BEScanCV}
      Jwt__Audience: ${JWT_AUDIENCE:-BEScanCV-Clients}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
    ports:
      - "${API_HTTP_PORT:-5226}:8080"
    volumes:
      - bescancv_pdf_data:/app/data/pdfs

  postgres:
    image: postgres:16-alpine
    container_name: bescancv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cv_project}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - bescancv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bescancv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - bescancv_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bescancv_postgres_data:
  bescancv_redis_data:
  bescancv_pdf_data:
